test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

google:
  service: GCS
  project: <%= ENV["GCS_PROJECT_ID"] %>
  credentials: <%= ENV["GCS_CREDENTIALS_JSON"] %>
  bucket: <%= ENV.fetch("GCS_BUCKET_AVATARS", "vibe-avatars") %>
