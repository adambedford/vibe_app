name: Deploy to Production
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.2.3)'
        required: true

jobs:
  staging-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Verify staging is green
        run: curl --fail ${{ secrets.STAGING_API_URL }}/up

  deploy-api-production:
    needs: staging-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway (production)
        uses: berviantoleo/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
          service: vibe-api
      - name: Run migrations
        run: railway run --service vibe-api -- bundle exec rails db:migrate
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
      - name: Health check
        run: curl --fail --retry 5 --retry-delay 10 ${{ secrets.PRODUCTION_API_URL }}/up
      - name: Monitor error rate (5 min)
        run: |
          echo "Waiting 5 minutes to monitor for error spikes..."
          sleep 300
          echo "Check Sentry dashboard for anomalies"

  deploy-validator-production:
    needs: staging-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy validator to Railway (production)
        uses: berviantoleo/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
          service: vibe-validator

  mobile-release:
    needs: deploy-api-production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci
        working-directory: apps/mobile
      - run: eas build --platform all --profile production --non-interactive
        working-directory: apps/mobile

  create-release:
    needs: [deploy-api-production, mobile-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          generate_release_notes: true
