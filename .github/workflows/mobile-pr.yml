name: Mobile PR Checks
on:
  pull_request:
    paths: ['apps/mobile/**', 'packages/**']

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json
      - run: npm ci
        working-directory: apps/mobile
      - run: npx tsc --noEmit
        working-directory: apps/mobile

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json
      - run: npm ci
        working-directory: apps/mobile
      - run: npm test -- --forceExit
        working-directory: apps/mobile

  sdk-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/vibe-sdk/package-lock.json
      - run: npm ci
        working-directory: packages/vibe-sdk
      - run: npm test
        working-directory: packages/vibe-sdk
